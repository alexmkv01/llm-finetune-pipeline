name: train

on:
  push:
    branches:
      - train-*

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-packages

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure draft PR exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list --head "${GITHUB_REF_NAME}" --json number --jq 'length')
          if [ "$PR_COUNT" -eq 0 ]; then
            gh pr create \
              --draft \
              --title "Train: ${GITHUB_REF_NAME}" \
              --body "DVC pipeline run from branch \`${GITHUB_REF_NAME}\`" \
              --head "${GITHUB_REF_NAME}" \
              --base main
          fi

      - name: Run DVC pipeline and report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run ./scripts/dvc-repro-and-report.sh
